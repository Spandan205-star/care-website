<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care at Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins', sans-serif; color:#333; scroll-behavior:smooth; }

header { display:flex; justify-content:space-between; align-items:center; padding:15px 50px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
header h2 { color:#2a7f62; }

nav a { margin:0 15px; text-decoration:none; color:#333; font-weight:500; }
nav a:hover { color:#2a7f62; }

.hero {
  height:90vh;
  background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
  url('https://images.unsplash.com/photo-1584515933487-779824d29309');
  background-size:cover;
  display:flex;
  align-items:center;
  padding:0 50px;
  color:white;
}

.hero h1 { font-size:48px; }

.btn {
  padding:12px 25px;
  background:#4CAF50;
  color:white;
  text-decoration:none;
  border-radius:5px;
  margin:5px;
  display:inline-block;
  border:none;
  cursor:pointer;
}

.btn:hover { background:#3e9442; }

.section { padding:60px 50px; }

.services, .doctors, .testimonials {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  background:#f9f9f9;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

form input, form select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

#appointmentsList {
  margin-top:20px;
  background:#f1f1f1;
  padding:15px;
  border-radius:10px;
}

footer { background:#2a7f62; color:white; text-align:center; padding:20px; margin-top:40px; }
</style>
</head>

<body>

<header>
  <h2>Care at Home</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Quality Care in the Comfort of Your Home</h1>
    <p>Professional care at your doorstep</p>

    <a href="#contact" class="btn">Book Appointment</a>
    <a href="tel:+919876543210" class="btn">Call</a>
  </div>
</section>

<section id="services" class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Nursing Care</div>
    <div class="card">Physiotherapy</div>
    <div class="card">Elderly Care</div>
  </div>
</section>

<section id="contact" class="section">
  <h2>Book Appointment</h2>

  <form id="form">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <input type="date" id="date" required>

    <select id="service" required>
      <option value="">Select Service</option>
      <option>Nursing Care</option>
      <option>Physiotherapy</option>
      <option>Elderly Care</option>
    </select>

    <button type="submit" class="btn">Submit</button>
  </form>

  <p id="msg" style="color:green;"></p>

  <div id="appointmentsList">
    <h3>Booked Appointments</h3>
    <ul id="list"></ul>
  </div>
</section>

<footer>
  <p>© 2026 Care at Home</p>
</footer>

<script>
// Load existing data
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
display();

// Submit form
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let data = {
    name: name.value,
    phone: phone.value,
    date: date.value,
    service: service.value
  };

  appointments.push(data);
  localStorage.setItem("appointments", JSON.stringify(appointments));

  document.getElementById("msg").innerText = "Appointment Booked!";
  this.reset();

  display();
});

// Display data
function display(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  appointments.forEach((a, index)=>{
    let li = document.createElement("li");
    li.innerHTML = `${a.name} - ${a.service} on ${a.date} 📞 ${a.phone}`;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
